[package]
name = "gen-lsp-types"
version = "0.2.0"
edition = "2024"
authors = ["Riley Bruins <ribru17@gmail.com>"]
description = "Library of Rust LSP types generated from the official metamodel"
license = "MIT"
repository = "https://github.com/ribru17/gen-lsp-types"
keywords = ["lsp", "codegen"]
readme = "README.md"
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[dependencies]
derive-new = "0.7.0"
derive_more = { version = "2.1.1", features = ["from"] }
serde = { workspace = true }
serde_json = { workspace = true }

[workspace]
members = [".", "xtask"]

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
