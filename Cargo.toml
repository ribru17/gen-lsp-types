[package]
name = "gen-lsp-types"
version = "0.4.0"
edition = "2024"
authors = ["Riley Bruins <ribru17@gmail.com>"]
description = "Library of Rust LSP types generated from the official metamodel"
license = "MIT"
repository = "https://github.com/ribru17/gen-lsp-types"
keywords = ["lsp", "codegen"]
readme = "README.md"
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[dependencies]
fluent-uri = { version = "0.4.1", features = ["serde"], optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
url = { version = "2.5.8", features = ["serde"], optional = true }

[lints]
workspace = true

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "deny", priority = -1 }

cargo_common_metadata = "allow"
cast_precision_loss = "allow"
cast-possible-truncation = "allow"
cast_lossless = "allow"
cast_sign_loss = "allow"
cognitive_complexity = "allow"
items_after_statements = "allow"
multiple_crate_versions = "allow"
too_many_lines = "allow"

[features]
url = ["dep:url"]
fluent-uri = ["dep:fluent-uri"]

[workspace]
members = [".", "xtask"]

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
