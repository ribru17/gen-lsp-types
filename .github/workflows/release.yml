name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Publish to crates.io
        run: cargo publish --package gen-lsp-types --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
